    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Rountree Leitman Klein & Geer</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #1a3a5c;
            --navy-light: #2a4a6c;
            --blue-accent: #2d7bc4;
            --blue-light: #4a9ae0;
            --white: #ffffff;
            --serif: 'Crimson Pro', Georgia, serif;
            --sans: 'Montserrat', -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: var(--sans);
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
            color: var(--white);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(10, 22, 40, 0.08);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80px;
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .logo-img {
            height: 48px;
            width: auto;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 120px 20px 60px;
        }

        .error-code {
            font-family: var(--serif);
            font-size: clamp(100px, 20vw, 180px);
            font-weight: 700;
            color: var(--blue-light);
            line-height: 1;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .error-title {
            font-family: var(--serif);
            font-size: clamp(28px, 5vw, 42px);
            font-weight: 500;
            margin-bottom: 20px;
        }

        .error-message {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            max-width: 500px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-home {
            display: inline-block;
            background: var(--white);
            color: var(--navy);
            padding: 16px 32px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            background: var(--blue-light);
            color: var(--white);
            transform: translateY(-2px);
        }

        .helpful-links {
            margin-top: 60px;
        }

        .helpful-links h3 {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--blue-light);
            margin-bottom: 20px;
        }

        .helpful-links ul {
            list-style: none;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .helpful-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 15px;
            transition: color 0.3s ease;
        }

        .helpful-links a:hover {
            color: var(--white);
        }

        @media (max-width: 768px) {
            .nav-container {
                padding: 0 20px;
                height: 70px;
            }

            .logo-img {
                height: 40px;
            }

            .content {
                padding: 100px 20px 40px;
            }

            .helpful-links ul {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="images/logo-transparent.png" alt="RLKG Law" class="logo-img">
            </a>
        </div>
    </nav>

    <main class="content">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
        <a href="index.html" class="btn-home">Return to Homepage</a>

        <div class="helpful-links">
            <h3>Helpful Links</h3>
            <ul>
                <li><a href="practice-areas.html">Practice Areas</a></li>
                <li><a href="our-team.html">Our Team</a></li>
                <li><a href="contact.html">Contact Us</a></li>
                <li><a href="reviews-ratings.html">Reviews & Ratings</a></li>
            </ul>
        </div>
    </main>

    <script>
        const nav = document.getElementById('nav');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
