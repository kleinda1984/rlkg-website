name: Fix Associate Nav Order
on: workflow_dispatch

permissions:
  contents: write

jobs:
  fix-nav:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run fix script
        run: python3 fix-blog-nav.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Reorder associates in blog nav: Childers, Powers, Eisenberg, Matthews"
          git push
