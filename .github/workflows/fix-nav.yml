name: Fix Associate Nav Order
on: workflow_dispatch

permissions:
  contents: write

jobs:
  fix-nav:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Show current order in index.html
        run: grep -A 6 "Associates" index.html

      - name: Fix associate order in all HTML files
        run: |
          python3 << 'PYEOF'
          import glob, re

          count = 0
          for f in glob.glob("**/*.html", recursive=True):
              with open(f, "r") as fh:
                  content = fh.read()

              pattern = r"(<div class=\"dropdown-label\">Associates</div>)\s*<a href='/william-matthews'>William D. Matthews</a>\s*<a href='/shawn-eisenberg'>Shawn Eisenberg</a>\s*<a href='/elizabeth-childers'>Elizabeth Childers</a>\s*<a href='/caitlyn-powers'>Caitlyn Powers</a>"

              replacement = r"""\1
                            <a href='/elizabeth-childers'>Elizabeth Childers</a>
                            <a href='/caitlyn-powers'>Caitlyn Powers</a>
                            <a href='/shawn-eisenberg'>Shawn Eisenberg</a>
                            <a href='/william-matthews'>William D. Matthews</a>"""

              new_content = re.sub(pattern, replacement, content)
              if new_content != content:
                  with open(f, "w") as fh:
                      fh.write(new_content)
                  count += 1
                  print(f"Fixed: {f}")

          print(f"\nTotal files fixed: {count}")
          PYEOF

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Reorder associates in nav: Childers, Powers, Eisenberg, Matthews"
          git push
