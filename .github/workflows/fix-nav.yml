name: Fix Associate Nav Order
on: workflow_dispatch

jobs:
  fix-nav:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Fix associate order in all HTML files
        run: |
          python3 << 'EOF'
          import glob, re

          old = """<a href='/william-matthews'>William D. Matthews</a>
                            <a href='/shawn-eisenberg'>Shawn Eisenberg</a>
                            <a href='/elizabeth-childers'>Elizabeth Childers</a>
                            <a href='/caitlyn-powers'>Caitlyn Powers</a>"""

          new = """<a href='/elizabeth-childers'>Elizabeth Childers</a>
                            <a href='/caitlyn-powers'>Caitlyn Powers</a>
                            <a href='/shawn-eisenberg'>Shawn Eisenberg</a>
                            <a href='/william-matthews'>William D. Matthews</a>"""

          count = 0
          for f in glob.glob("**/*.html", recursive=True):
              with open(f, "r") as fh:
                  content = fh.read()
              if old in content:
                  content = content.replace(old, new)
                  with open(f, "w") as fh:
                      fh.write(content)
                  count += 1
                  print(f"Fixed: {f}")
          print(f"\nTotal files fixed: {count}")
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Reorder associates in nav: Childers, Powers, Eisenberg, Matthews"
          git push
