name: Fix OG URL Tags
on: workflow_dispatch

permissions:
  contents: write

jobs:
  fix-og:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run fix script
        run: python3 fix-og-url.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Add og:url meta tags to main pages and attorney profiles"
          git push
