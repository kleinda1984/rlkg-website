name: Update Subpage CTA Style
on: workflow_dispatch

permissions:
  contents: write

jobs:
  fix-cta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update CTA styles on practice area subpages
        run: |
          python3 << 'PYEOF'
          import re

          pages = [
              "business-bankruptcy.html",
              "personal-bankruptcy.html",
              "debtor-creditor.html",
              "litigation.html",
          ]

          for page in pages:
              with open(page, "r") as f:
                  html = f.read()

              original = html

              # Update .cta-section background from navy to cream
              html = re.sub(
                  r'(\.cta-section\s*\{[^}]*?)background:\s*var\(--navy\)',
                  r'\1background: var(--cream)',
                  html
              )

              # Update .cta-heading color from white to navy
              html = re.sub(
                  r'(\.cta-heading\s*\{[^}]*?)color:\s*var\(--white\)',
                  r'\1color: var(--navy)',
                  html
              )

              # Update .cta-text color from white/transparent to gray
              html = re.sub(
                  r'(\.cta-text\s*\{[^}]*?)color:\s*rgba\(255,\s*255,\s*255,\s*0\.9\)',
                  r'\1color: var(--gray-600)',
                  html
              )

              # Update .cta-button background from blue-accent to navy
              html = re.sub(
                  r'(\.cta-button\s*\{[^}]*?)background:\s*var\(--blue-accent\)',
                  r'\1background: var(--navy)',
                  html
              )

              # Update .cta-phone color from blue-light to navy
              html = re.sub(
                  r'(\.cta-phone\s*\{[^}]*?)color:\s*var\(--blue-light\)',
                  r'\1color: var(--navy)',
                  html
              )

              # Update inline phone link color from blue-light to navy
              html = html.replace(
                  'class="cta-phone"><a href="tel:4045841238" style="color:var(--blue-light)',
                  'class="cta-phone"><a href="tel:4045841238" style="color:var(--navy)'
              )

              if html != original:
                  with open(page, "w") as f:
                      f.write(html)
                  print(f"Updated: {page}")
              else:
                  print(f"No changes: {page}")

          PYEOF

      - name: Show changes
        run: git diff --stat

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update practice area subpage CTAs to cream background style"
          git pull --rebase
          git push
