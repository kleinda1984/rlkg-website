name: Fix Litigation Card Link
on: workflow_dispatch

permissions:
  contents: write

jobs:
  fix-card:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix Litigation card on practice-areas page
        run: |
          python3 << 'PYEOF'
          import re

          with open("practice-areas.html", "r") as f:
              html = f.read()

          original = html

          # Find the Litigation card block (it's still a div, not an <a>)
          pattern = r'<div class="practice-card">([\s\S]*?Litigation[\s\S]*?)</div>\s*</div>\s*</section>'

          match = re.search(pattern, html)
          if match:
              old = match.group(0)
              new = old.replace(
                  '<div class="practice-card">',
                  '<a href="litigation.html" class="practice-card" style="text-decoration:none;color:inherit;display:block;">',
                  1
              )
              # Replace the first </div> that closes the card (the last one before </div></section>)
              # We need to replace: </div>\n        </div>\n    </section>
              # The first </div> is the card close, second is grid close
              new = new.replace(
                  '</div>\n        </div>\n    </section>',
                  '</a>\n        </div>\n    </section>',
                  1
              )
              html = html.replace(old, new, 1)
              print("Updated: Litigation card linked to litigation.html")
          else:
              print("No match found for Litigation div card")

          if html != original:
              with open("practice-areas.html", "w") as f:
                  f.write(html)
              print("practice-areas.html updated")
          else:
              print("No changes made")

          PYEOF

      - name: Debug - verify
        run: grep -n "practice-card\|litigation" practice-areas.html | grep -v "\." | head -10

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Link Litigation card on practice-areas page"
          git pull --rebase
          git push
