name: Update Blog OG Images
on: workflow_dispatch

permissions:
  contents: write

jobs:
  fix-og-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update og:image tags on blog posts
        run: python3 fix-blog-og-images.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update blog posts to use unique OG images"
          git push
