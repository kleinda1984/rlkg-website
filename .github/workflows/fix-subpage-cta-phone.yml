name: Fix Subpage CTA Phone Number
on: workflow_dispatch

permissions:
  contents: write

jobs:
  fix-cta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove phone number and fix button centering
        run: |
          python3 << 'PYEOF'
          import re

          pages = [
              "business-bankruptcy.html",
              "personal-bankruptcy.html",
              "debtor-creditor.html",
              "litigation.html",
          ]

          for page in pages:
              with open(page, "r") as f:
                  html = f.read()

              original = html

              # Remove the cta-phone div and its contents
              html = re.sub(
                  r'\s*<div class="cta-phone">.*?</div>',
                  '',
                  html,
                  flags=re.DOTALL
              )

              # Remove the .cta-phone CSS block
              html = re.sub(
                  r'\s*\.cta-phone\s*\{[^}]*\}',
                  '',
                  html
              )

              # Fix button margin - remove asymmetric right margin so it centers properly
              html = re.sub(
                  r'(\.cta-button\s*\{[^}]*?)margin:\s*0\s+12px\s+12px\s+0;',
                  r'\1margin: 0 auto;',
                  html
              )

              if html != original:
                  with open(page, "w") as f:
                      f.write(html)
                  print(f"Updated: {page}")
              else:
                  print(f"No changes: {page}")

          PYEOF

      - name: Show changes
        run: git diff --stat

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Remove phone from subpage CTAs and fix button centering"
          git pull --rebase
          git push
