name: Fix Homepage Practice Area Card Links
on: workflow_dispatch

permissions:
  contents: write

jobs:
  fix-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug - show current card links
        run: |
          echo "=== All practice-card hrefs ==="
          grep -n "practice-card" index.html

      - name: Fix practice area card links on homepage
        run: |
          python3 << 'PYEOF'
          import re

          with open("index.html", "r") as f:
              html = f.read()

          original = html

          # Map practice area titles to their correct page URLs
          card_map = {
              "Business Bankruptcy": "business-bankruptcy.html",
              "Personal Bankruptcy": "personal-bankruptcy.html",
              "Debtor / Creditor": "debtor-creditor.html",
              "Litigation": "litigation.html",
          }

          # Find all practice-card anchor tags as complete blocks
          # Each card: <a href="..." class="practice-card">...content...</a>
          card_pattern = re.compile(
              r'<a\s+href="[^"]*"\s+class="practice-card">[\s\S]*?</a>'
          )

          def replace_card(match):
              card_html = match.group(0)
              for title, url in card_map.items():
                  if title in card_html:
                      # Replace the href value in this card
                      new_card = re.sub(
                          r'(<a\s+href=")[^"]*("\s+class="practice-card">)',
                          r'\g<1>' + url + r'\2',
                          card_html
                      )
                      print(f"Updated: {title} -> {url}")
                      return new_card
              return card_html

          html = card_pattern.sub(replace_card, html)

          # Also fix nav link if previous run damaged it
          # Look for nav links pointing to individual pages that should be practice-areas
          nav_fix = re.sub(
              r'(<a\s+href=")[^"]*\.html("[^>]*>Practice Areas</a>)',
              r'\g<1>practice-areas.html\2',
              html
          )
          if nav_fix != html:
              html = nav_fix
              print("Fixed nav 'Practice Areas' link")

          if html != original:
              with open("index.html", "w") as f:
                  f.write(html)
              print("\nHomepage updated successfully")
          else:
              print("\nNo changes made")

          PYEOF

      - name: Show changes
        run: git diff

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Fix homepage practice area cards to link to individual pages"
          git pull --rebase
          git push
