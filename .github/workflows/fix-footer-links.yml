name: Update Footer Practice Area Links
on: workflow_dispatch

permissions:
  contents: write

jobs:
  fix-footer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix footer links
        shell: bash
        run: |
          echo "=== DEBUG ==="
          grep -rn "practice-areas" --include="*.html" . | grep -i "business bank" | head -3
          echo "=== END DEBUG ==="
          find . -name "*.html" -exec sed -E -i "s|practice-areas(.)>Business Bankruptcy|business-bankruptcy\1>Business Bankruptcy|g" {} +
          find . -name "*.html" -exec sed -E -i "s|practice-areas(.)>Personal Bankruptcy|personal-bankruptcy\1>Personal Bankruptcy|g" {} +
          find . -name "*.html" -exec sed -E -i "s|practice-areas(.)>Debtor / Creditor|debtor-creditor\1>Debtor \&amp; Creditor Rights|g" {} +
          find . -name "*.html" -exec sed -E -i "s|practice-areas(.)>Litigation</a>|litigation\1>Litigation</a>|g" {} +
          echo "=== CHANGES ==="
          git diff --stat

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update footer practice area links to individual pages"
          git pull --rebase
          git push
