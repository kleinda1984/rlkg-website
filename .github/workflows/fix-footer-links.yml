name: Update Footer Practice Area Links
on: workflow_dispatch

permissions:
  contents: write

jobs:
  fix-footer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix footer links in main pages
        run: |
          find . -maxdepth 1 -name "*.html" -exec sed -E -i "s|practice-areas\.html\">Business Bankruptcy|business-bankruptcy.html\">Business Bankruptcy|g" {} +
          find . -maxdepth 1 -name "*.html" -exec sed -E -i "s|practice-areas\.html\">Personal Bankruptcy|personal-bankruptcy.html\">Personal Bankruptcy|g" {} +
          find . -maxdepth 1 -name "*.html" -exec sed -E -i "s|practice-areas\.html\">Debtor / Creditor|debtor-creditor.html\">Debtor \&amp; Creditor Rights|g" {} +
          find . -maxdepth 1 -name "*.html" -exec sed -E -i "s|practice-areas\.html\">Litigation</a>|litigation.html\">Litigation</a>|g" {} +
          echo "Main pages done"

      - name: Fix footer links in blog pages
        run: |
          find ./blog -name "*.html" -exec sed -E -i "s|\.\./practice-areas\.html\">Business Bankruptcy|../business-bankruptcy.html\">Business Bankruptcy|g" {} +
          find ./blog -name "*.html" -exec sed -E -i "s|\.\./practice-areas\.html\">Personal Bankruptcy|../personal-bankruptcy.html\">Personal Bankruptcy|g" {} +
          find ./blog -name "*.html" -exec sed -E -i "s|\.\./practice-areas\.html\">Debtor / Creditor|../debtor-creditor.html\">Debtor \&amp; Creditor Rights|g" {} +
          find ./blog -name "*.html" -exec sed -E -i "s|\.\./practice-areas\.html\">Litigation</a>|../litigation.html\">Litigation</a>|g" {} +
          echo "Blog pages done"

      - name: Show changes
        run: git diff --stat

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update footer practice area links to individual pages"
          git pull --rebase
          git push
