name: Update Footer Practice Area Links
on: workflow_dispatch

permissions:
  contents: write

jobs:
  fix-footer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix footer links
        run: |
          find . -name "*.html" | while read f; do
            sed -i "s|/practice-areas'>Business Bankruptcy|/business-bankruptcy'>Business Bankruptcy|g" "$f"
            sed -i "s|/practice-areas\">Business Bankruptcy|/business-bankruptcy\">Business Bankruptcy|g" "$f"
            sed -i "s|/practice-areas'>Personal Bankruptcy|/personal-bankruptcy'>Personal Bankruptcy|g" "$f"
            sed -i "s|/practice-areas\">Personal Bankruptcy|/personal-bankruptcy\">Personal Bankruptcy|g" "$f"
            sed -i "s|/practice-areas'>Debtor / Creditor|/debtor-creditor'>Debtor \&amp; Creditor Rights|g" "$f"
            sed -i "s|/practice-areas\">Debtor / Creditor|/debtor-creditor\">Debtor \&amp; Creditor Rights|g" "$f"
            sed -i "s|/practice-areas'>Litigation</a>|/litigation'>Litigation</a>|g" "$f"
            sed -i "s|/practice-areas\">Litigation</a>|/litigation\">Litigation</a>|g" "$f"
          done
          echo "Done"

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update footer practice area links to individual pages"
          git pull --rebase
          git push
