name: Update Footer Practice Area Links
on: workflow_dispatch

permissions:
  contents: write

jobs:
  fix-footer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix footer links
        shell: bash
        run: |
          Q=$(printf '\x27')
          echo "Quote char is: ${Q}"
          echo "Searching 'practice-areas' in HTML files..."
          grep -rl "practice-areas" --include="*.html" . | head -5
          echo "---"
          find . -name "*.html" -exec sed -i "s|practice-areas${Q}>Business Bankruptcy|business-bankruptcy${Q}>Business Bankruptcy|g" {} +
          find . -name "*.html" -exec sed -i "s|practice-areas${Q}>Personal Bankruptcy|personal-bankruptcy${Q}>Personal Bankruptcy|g" {} +
          find . -name "*.html" -exec sed -i "s|practice-areas${Q}>Debtor / Creditor|debtor-creditor${Q}>Debtor \&amp; Creditor Rights|g" {} +
          find . -name "*.html" -exec sed -i "s|practice-areas${Q}>Litigation</a>|litigation${Q}>Litigation</a>|g" {} +
          git diff --stat

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update footer practice area links to individual pages"
          git pull --rebase
          git push
